<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Fund Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Branding Colors based on the image */
            --primary: #ff5a00; /* Vibrant Orange */
            --primary-light: #ff8b4d;
            --secondary: #112b5b; /* Navy Blue */
            --bg-color: #fcfcfc; /* Very light gray/white background */
            --text-main: #1e293b; /* Dark slate for readability */
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85); /* Light glass */
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px rgba(17, 43, 91, 0.08); /* Navy tinted shadow */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* Animated Background Gradients (Light theme) */
        .bg-shapes {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at top, #fff3eb 0%, transparent 40%),
                        radial-gradient(circle at bottom right, #ebf0ff 0%, transparent 40%);
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out alternate;
        }
        .shape-1 {
            background: var(--primary);
            width: 400px; height: 400px;
            top: -10%; left: -10%;
        }
        .shape-2 {
            background: var(--secondary);
            width: 500px; height: 500px;
            bottom: -20%; right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            width: 98%;
            max-width: 1400px; /* Nới rộng tối đa để chứa hết chữ */
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        /* Logo styling */
        .logo-container {
            margin-bottom: 1rem;
        }
        .logo {
            max-height: 80px;
            object-fit: contain;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        h1 span.highlight {
            color: var(--primary);
        }
        
        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Dashboard Overview Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        /* Top border color accent for cards */
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
        }
        .card-primary::before { background: var(--primary); }
        .card-secondary::before { background: var(--secondary); }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(17, 43, 91, 0.12);
        }

        .stat-item {
            text-align: center;
        }
        .stat-label {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1;
            color: var(--primary);
        }
        .stat-value.highlight {
            color: var(--secondary);
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 1.5rem;
            width: 100%;
            height: 14px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%; /* Set via JS */
            background: linear-gradient(90deg, #ff8b4d, var(--primary));
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Registered List Area */
        .list-section {
            animation: fadeInUp 0.8s ease-out;
        }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0 1rem;
        }
        .list-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Table Design */
        .glass-table-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow-x: auto; /* Cho phép cuộn ngang nếu màn hình nhỏ, tránh bị cắt chữ */
            box-shadow: var(--shadow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            white-space: nowrap; /* Ép chữ trên 1 dòng */
        }
        th, td {
            padding: 0.8rem 1rem; /* Thu nhỏ padding hơn nữa */
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.85rem; /* Chữ nhỏ thêm 1 chút xíu */
        }
        th {
            background: rgba(17, 43, 91, 0.05);
            color: var(--secondary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr {
            transition: background 0.2s ease;
        }
        tr:hover {
            background: rgba(255, 90, 0, 0.03);
        }
        
        .user-name {
            font-weight: 600;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }
        .avatar-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(255, 90, 0, 0.3);
        }
        .department-tag {
            background: rgba(17, 43, 91, 0.1);
            color: var(--secondary);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        /* Status Badge */
        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-badge.not-started {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-muted);
        }
        .status-badge.in-progress {
            background: rgba(255, 90, 0, 0.15);
            color: var(--primary);
        }
        .status-badge.cancelled {
            background: rgba(239, 68, 68, 0.15);
            color: #dc2626; /* Red */
        }
        tr.cancelled-row {
            opacity: 0.5;
            background: rgba(0, 0, 0, 0.02);
        }
        .status-badge.completed {
            background: rgba(16, 185, 129, 0.15);
            color: #059669; /* Emerald */
        }
        
        /* Time remaining badge */
        .time-badge {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .time-badge.safe { color: #059669; }
        .time-badge.warning { color: #f59e0b; }
        .time-badge.danger { color: #dc2626; }
        .time-badge.done { color: var(--text-muted); font-weight: normal;}

        /* Loading Spinner */
        .loader-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loader-text {
            margin-top: 1rem;
            color: var(--secondary);
            font-weight: 700;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #b91c1c;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 2rem;
            display: none;
            font-weight: 600;
        }

        /* Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stat-value { font-size: 3.5rem; }
            th, td { padding: 1rem; }
            .course-col { display: none; } /* Hide course on mobile to save space */
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Loading Screen -->
    <div id="loader" class="loader-wrapper">
        <div class="loader"></div>
        <div class="loader-text">ĐANG TẢI DỮ LIỆU...</div>
    </div>

    <div class="container" id="main-content" style="display: none;">
        <header>
            <!-- ĐỔI TÊN FILE LOGO BẠN TẢI LÊN THÀNH 'logo.png' (HAY CẬP NHẬT TÊN VÀO ĐÂY) -->
            <div class="logo-container">
                <img src="logo.png" alt="Company Logo" class="logo" id="company-logo">
            </div>

            <h1>Learning Fund <span class="highlight">Tracker</span></h1>
            <p class="subtitle">Bảng theo dõi tiến độ đăng ký tham gia chương trình</p>
        </header>

        <div id="error-box" class="error-message"></div>

        <div class="stats-grid">
            <!-- Total/Registered Card -->
            <div class="glass-card card-primary">
                <div class="stat-item">
                    <div class="stat-label">Số slot đã đăng ký</div>
                    <div class="stat-value" id="val-registered">0</div>
                    <div class="stat-label" style="margin-top:0.5rem; font-size:0.9rem; color: var(--text-muted);">
                        trên tổng số <span id="val-total" style="color:var(--secondary); font-weight:800; font-size:1.1rem;">25</span> suất
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>

            <!-- Remaining Card -->
            <div class="glass-card card-secondary">
                <div class="stat-item">
                    <div class="stat-label">Số suất còn lại</div>
                    <div class="stat-value highlight" id="val-remaining">25</div>
                </div>
            </div>
        </div>

        <div class="list-section">
            <div class="list-header">
                <h2>Danh sách đăng ký</h2>
            </div>
            
            <div class="glass-table-wrapper">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>Nhân viên</th>
                            <th>Phòng ban</th>
                            <th class="course-col">Chương trình đào tạo</th>
                            <th>Ngày đăng ký</th>
                            <th>Thời hạn</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state" style="display: none;">
                    Chưa có lượt đăng ký nào.
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CẤU HÌNH API LINK (DÀNH CHO GITHUB PAGES)
        // Dán URL Web App của Google Apps Script vào đây
        // ==========================================
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbwk0GNLK_A9MnSJ6cuYQdbQr0pirMCCEOScvIMwTgLtcFnpMdxrj1Yj6E5Rp67EvNVjHg/exec";

        // Hàm lấy chữ cái đầu của tên để làm Avatar
        function getInitials(name) {
            if (!name) return "U";
            let parts = name.trim().split(" ");
            let lastWord = parts[parts.length - 1];
            return lastWord.charAt(0).toUpperCase();
        }

        // Render dữ liệu lên UI
        function renderData(data) {
            if (data.status === "error") {
                document.getElementById('error-box').innerText = "Lỗi: " + data.message;
                document.getElementById('error-box').style.display = "block";
            } else {
                // Update stats
                document.getElementById('val-registered').innerText = data.registeredCount;
                document.getElementById('val-total').innerText = data.totalSlots;
                document.getElementById('val-remaining').innerText = data.remainingSlots;
                
                // Update progress bar
                let percentage = (data.registeredCount / data.totalSlots) * 100;
                if (percentage > 100) percentage = 100;
                // Add a small delay for the animation
                setTimeout(() => {
                    document.getElementById('progress-bar').style.width = percentage + '%';
                }, 100);

                // Update table
                const tbody = document.getElementById('table-body');
                const emptyState = document.getElementById('empty-state');
                const table = document.getElementById('users-table');
                
                tbody.innerHTML = ''; // clear old

                if (data.registeredList && data.registeredList.length > 0) {
                    table.style.display = "table";
                    emptyState.style.display = "none";
                    
                    // Sắp xếp: Yêu cầu Đang hoạt động ở trên, Hủy/Hết hạn đẩy xuống dưới
                    data.registeredList.sort((a, b) => {
                        if (a.isCancelled === b.isCancelled) return 0;
                        return a.isCancelled ? 1 : -1;
                    });
                    
                    data.registeredList.forEach(user => {
                        let tr = document.createElement('tr');
                        
                        // Avatar + Name
                        let tdName = document.createElement('td');
                        tdName.innerHTML = `
                            <div class="user-name">
                                <div class="avatar-placeholder">${getInitials(user.name)}</div>
                                <span>${user.name}</span>
                            </div>
                        `;
                        
                        // Department
                        let tdDept = document.createElement('td');
                        if (user.department) {
                            tdDept.innerHTML = `<span class="department-tag">${user.department}</span>`;
                        } else {
                            tdDept.innerHTML = `<span style="color:var(--text-muted)">-</span>`;
                        }
                        
                        // Course
                        let tdCourse = document.createElement('td');
                        tdCourse.className = "course-col";
                        tdCourse.innerText = user.course || "-";
                        
                        // Parse Date & Calculate Remaining
                        let MAX_DAYS = 45; // Thay đổi quy định số ngày tối đa ở đây
                        let regStr = "-";
                        let remainingHTML = "-";
                        let isLearning = false;
                        let isCompleted = false;

                        // Check status
                        let badgeClass = "not-started";
                        let statusText = user.status || "Chưa thực hiện";
                        
                        let sLower = statusText.toLowerCase();
                        if (user.isCancelled || sLower.indexOf("hết hạn") !== -1 || sLower.indexOf("hủy") !== -1 || sLower.indexOf("quá hạn") !== -1) {
                            badgeClass = "cancelled";
                            // Tái sử dụng status từ backend (Hết hạn hoặc Hủy)
                        } else if (sLower.indexOf("đang") !== -1) {
                            badgeClass = "in-progress";
                            isLearning = true;
                        } else if (sLower.indexOf("hoàn thành") !== -1) {
                            badgeClass = "completed";
                            isCompleted = true;
                        }

                        if (user.isCancelled) {
                            tr.className = "cancelled-row";
                            remainingHTML = `<span class="time-badge done">-</span>`;
                            
                            // Vẫn cố parse ngày tháng nếu có để hiển thị ngày đăng ký
                            if (user.regDate && user.regDate.trim() !== "") {
                                let d = new Date(user.regDate);
                                if (!isNaN(d.getTime())) {
                                    let dd = String(d.getDate()).padStart(2, '0');
                                    let mm = String(d.getMonth() + 1).padStart(2, '0');
                                    let yyyy = d.getFullYear();
                                    regStr = `${dd}/${mm}/${yyyy}`;
                                }
                            }
                        } else if (user.regDate && user.regDate.trim() !== "") {
                            let d = new Date(user.regDate);
                            // Nếu parse thành công
                            if (!isNaN(d.getTime())) {
                                let dd = String(d.getDate()).padStart(2, '0');
                                let mm = String(d.getMonth() + 1).padStart(2, '0');
                                let yyyy = d.getFullYear();
                                regStr = `${dd}/${mm}/${yyyy}`;
                                
                                if (!isLearning && !isCompleted) {
                                    // Calculate diff cho "Chưa thực hiện"
                                    let now = new Date();
                                    let todayObj = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                                    let regObj = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                                    
                                    let diffTime = todayObj - regObj;
                                    let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                                    let daysLeft = MAX_DAYS - diffDays;
                                    
                                    if (daysLeft < 0) daysLeft = 0;
                                    
                                    let timeClass = "safe";
                                    if (daysLeft <= 15 && daysLeft > 5) timeClass = "warning";
                                    if (daysLeft <= 5) timeClass = "danger";
                                    
                                    remainingHTML = `<span class="time-badge ${timeClass}">${daysLeft} ngày</span>`;
                                } else {
                                    remainingHTML = `<span class="time-badge done">-</span>`;
                                }
                            } else {
                                regStr = user.regDate; // Fallback to raw string
                            }
                        }

                        // Date Column
                        let tdDate = document.createElement('td');
                        tdDate.innerText = regStr;
                        
                        // Remaining Column
                        let tdRemaining = document.createElement('td');
                        tdRemaining.innerHTML = remainingHTML;

                        // Status Column
                        let tdStatus = document.createElement('td');
                        tdStatus.innerHTML = `<span class="status-badge ${badgeClass}">${statusText}</span>`;

                        tr.appendChild(tdName);
                        tr.appendChild(tdDept);
                        tr.appendChild(tdCourse);
                        tr.appendChild(tdDate);
                        tr.appendChild(tdRemaining);
                        tr.appendChild(tdStatus);
                        tbody.appendChild(tr);
                    });
                } else {
                    table.style.display = "none";
                    emptyState.style.display = "block";
                }
            }

            // Hide loader and show content
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }, 500);
        }

        // Mock data để test nếu chưa cài đặt Link
        function loadMockData() {
            let today = new Date();
            let d1 = new Date(today); d1.setDate(today.getDate() - 5);
            let d2 = new Date(today); d2.setDate(today.getDate() - 20);
            let d3 = new Date(today); d3.setDate(today.getDate() - 42);
            let d4 = new Date(today); d4.setDate(today.getDate() - 10);
            let d5 = new Date(today); d5.setDate(today.getDate() - 48); // Đã hết hạn
            
            setTimeout(() => {
                renderData({
                    status: "success",
                    totalSlots: 25,
                    registeredCount: 4, // 1 bị hủy
                    remainingSlots: 21,
                    registeredList: [
                        { regDate: d1.toISOString(), name: "Nguyễn Văn A", department: "IT", course: "Data Science", status: "Chưa thực hiện", isCancelled: false },
                        { regDate: d5.toISOString(), name: "Lý Thị F", department: "Design", course: "UI/UX Mastery", status: "Hết hạn", isCancelled: true },
                        { regDate: d2.toISOString(), name: "Trần Thị B", department: "HR", course: "Communication Skills", status: "Đang thực hiện", isCancelled: false },
                        { regDate: d3.toISOString(), name: "Lê Hoàng C", department: "Marketing", course: "Digital Marketing", status: "Chưa thực hiện", isCancelled: false },
                        { regDate: "", name: "Phạm D", department: "Sales", course: "", status: "Chưa thực hiện", isCancelled: false },
                        { regDate: d4.toISOString(), name: "Đặng Thị E", department: "Finance", course: "Advanced Excel", status: "Đã hoàn thành", isCancelled: false }
                    ]
                });
            }, 1500);
        }

        // Fetch data từ Google Apps Script
        function fetchDataFromAPI() {
            if (GOOGLE_API_URL === "DÁN_WEB_APP_URL_CỦA_BẠN_VÀO_ĐÂY" || GOOGLE_API_URL === "") {
                console.log("Chưa cấu hình API URL. Đang tải dữ liệu mẫu...");
                loadMockData();
                return;
            }

            fetch(GOOGLE_API_URL)
                .then(response => response.json())
                .then(data => renderData(data))
                .catch(error => {
                    renderData({ status: "error", message: "Không thể kết nối tới Google Sheet API. Lỗi: " + error.message });
                });
        }

        // Khởi chạy khi load trang
        window.onload = function() {
            fetchDataFromAPI();
        };
    </script>
</body>
</html>
